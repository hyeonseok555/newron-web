services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: newron-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - MAIN_API_URL=${MAIN_API_URL:-https://newron.shop/api/v1}
      - PERS_API_URL=${PERS_API_URL:-http://121.134.239.75:7000}
      - AI_API_URL=${AI_API_URL:-http://121.134.239.75:8024/api/v1}
      - BRIEF_API_URL=${BRIEF_API_URL:-http://121.134.239.75:9000}
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 로컬 개발용 - 핫리로드 지원
  web-dev:
    image: node:22-alpine
    container_name: newron-web-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules        # 호스트 node_modules 제외
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local
    command: sh -c "corepack enable && pnpm dev"
    profiles:
      - dev
